<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>말씀 암송 파트너</title>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    :root {
      --bg-color: #F8FAFC;
      --card-bg: #FFFFFF;
      --primary: #4F46E5;       /* 클래스업 느낌의 트렌디한 인디고 블루 */
      --primary-light: #EEF2F6;
      --text-main: #1E293B;
      --text-muted: #64748B;
      --success: #10B981;
      --border: #E2E8F0;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: var(--bg-color);
      margin: 0;
      padding: 40px 20px;
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* 클래스업 스타일의 깔끔한 대시보드 헤더 */
    .dashboard-header {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      margin-bottom: 30px;
    }

    .dashboard-title h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    
    .dashboard-title p {
      margin: 0;
      color: var(--text-muted);
      font-size: 16px;
    }

    .stats-container {
      display: flex;
      gap: 20px;
    }

    .stat-box {
      background: var(--primary-light);
      padding: 12px 24px;
      border-radius: 12px;
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
    }

    /* 리스트 디자인 (격자 및 라인 형태) */
    .verse-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .verse-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s ease;
    }

    .verse-card:hover {
      border-color: var(--primary);
      transform: translateY(-1px);
    }

    .verse-info .day-tag {
      font-size: 14px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .verse-info .ref-text {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-main);
    }

    /* 심플하고 직관적인 버튼 */
    .btn {
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn:hover { background: #F1F5F9; }

    .btn-primary {
      background: var(--primary);
      color: white;
      border: none;
    }

    .btn-primary:hover { background: #4338CA; }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--success);
      font-weight: 600;
      font-size: 16px;
    }

    /* 모달창 디자인 리팩토링 */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.3);
      backdrop-filter: blur(4px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: var(--card-bg);
      width: 90%;
      max-width: 640px;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      position: relative;
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .close-btn {
      position: absolute;
      top: 24px; right: 24px;
      font-size: 24px;
      cursor: pointer;
      color: var(--text-muted);
    }

    .modal-header-tag {
      color: var(--primary);
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .modal-title {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 30px 0;
    }

    .verse-display-box {
      background: var(--bg-color);
      border-radius: 12px;
      padding: 30px;
      font-size: 22px;
      line-height: 1.6;
      font-weight: 500;
      margin-bottom: 30px;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .action-group {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .feedback-area {
      margin-top: 25px;
      font-size: 16px;
      font-weight: 600;
      min-height: 50px;
      color: var(--text-muted);
    }

    .loading-spinner {
      font-size: 18px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 50px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="dashboard-header">
      <div class="dashboard-title">
        <h1>말씀 암송 파트너</h1>
        <p>매일 달콤한 지혜의 말씀을 마음속에 저축해요.</p>
      </div>
      <div class="stats-container">
        <div class="stat-box">
          <div class="stat-label">🔥 연속 학습</div>
          <div class="stat-value" id="streak-text">- 일째</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">📈 전체 진도율</div>
          <div class="stat-value" id="progress-text">-%</div>
        </div>
      </div>
    </div>

    <div id="loading" class="loading-spinner">구글 시트에서 오늘의 말씀을 가져오고 있어요... 🚀</div>

    <div class="verse-grid" id="verse-list-container"></div>
  </div>

  <div class="modal-overlay" id="verse-modal">
    <div class="modal-content">
      <div class="close-btn" onclick="closeModal()">✕</div>
      <div class="modal-header-tag" id="modal-day">DAY 1</div>
      <h2 class="modal-title" id="modal-ref">잠언 1장 1절</h2>
      
      <div class="verse-display-box" id="modal-verse">
        구절을 불러오는 중입니다.
      </div>
      
      <div class="action-group">
        <button class="btn" id="lang-toggle-btn" onclick="toggleLanguage()">🇬🇧 영어로 변경</button>
        <button class="btn btn-primary" id="record-btn" onclick="startRecording()">🎤 암송 녹음하기</button>
      </div>
      
      <div class="feedback-area" id="feedback-msg"></div>
    </div>
  </div>

  <script>
    // 제안해주신 실제 구글 앱스 스크립트 웹앱 URL 연동
    const API_URL = 'https://script.google.com/macros/s/AKfycbx508eKSjf0YgxaQ_rfah_X34uW92vKy4JNwqJQR726mzXdujzrg2RY7JYSmIYyI86irw/exec';
    
    let versesData = [];
    let currentVerse = null;
    let isEnglish = false;
    let recognition;

    // 아이 맞춤형 파트너 축하 피드백 멘트
    const cheers = [
      "최고야! 오늘 말씀도 완벽하게 마음속에 저장 완료! 🌟",
      "와, 발음도 훌륭한걸? 예수님이 정말 기뻐하시겠어! 🎉",
      "대단해! 벌써 이만큼이나 외우다니, 내일도 너무 기대된다! 🥳",
      "마치 천사 같은 목소리였어! 참 잘했어요! ❤️"
    ];

    async function loadData() {
      try {
        const response = await fetch(API_URL);
        versesData = await response.json();
        document.getElementById('loading').style.display = 'none';
        init();
      } catch (error) {
        document.getElementById('loading').innerText = '데이터를 불러오지 못했습니다. 시트 권한을 확인해주세요.';
        console.error(error);
      }
    }

    function init() {
      renderList();
      updateStats();
      setupSpeechRecognition();
    }

    function renderList() {
      const container = document.getElementById('verse-list-container');
      container.innerHTML = '';
      
      versesData.forEach(verse => {
        const card = document.createElement('div');
        card.className = 'verse-card';
        card.innerHTML = `
          <div class="verse-info">
            <div class="day-tag">${verse.day}</div>
            <div class="ref-text">${verse.reference}</div>
          </div>
          <div>
            ${verse.isCompleted 
              ? `<div class="status-badge"><span>✓</span> 완료</div>` 
              : `<button class="btn btn-primary" onclick="openModal(${verse.id})">암송하기</button>`}
          </div>
        `;
        container.appendChild(card);
      });
    }

    function openModal(id) {
      currentVerse = versesData.find(v => v.id === id);
      isEnglish = false;
      document.getElementById('modal-day').innerText = currentVerse.day;
      document.getElementById('modal-ref').innerText = currentVerse.reference;
      document.getElementById('modal-verse').innerText = currentVerse.korean;
      document.getElementById('lang-toggle-btn').innerText = "🇬🇧 영어로 변경";
      document.getElementById('feedback-msg').innerText = "";
      document.getElementById('verse-modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('verse-modal').style.display = 'none';
      if(recognition) recognition.stop();
    }

    function toggleLanguage() {
      isEnglish = !isEnglish;
      const btn = document.getElementById('lang-toggle-btn');
      const text = document.getElementById('modal-verse');
      
      if(isEnglish) {
        text.innerText = currentVerse.english;
        btn.innerText = "🇰🇷 한글로 변경";
      } else {
        text.innerText = currentVerse.korean;
        btn.innerText = "🇬🇧 영어로 변경";
      }
    }

    function setupSpeechRecognition() {
      window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!window.SpeechRecognition) {
        alert("아이패드의 Safari 혹은 Chrome 브라우저에서 마이크 사용을 허용해 주세요!");
        return;
      }
      recognition = new SpeechRecognition();
      recognition.interimResults = false;

      recognition.onresult = function(event) {
        const spokenText = event.results[0][0].transcript;
        document.getElementById('feedback-msg').style.color = "var(--text-main)";
        document.getElementById('feedback-msg').innerText = "내가 말한 내용: " + spokenText;
        checkAccuracy(spokenText);
      };
      
      recognition.onerror = function() {
        document.getElementById('feedback-msg').innerText = "목소리가 잘 안 들렸어요. 다시 조용히 외워볼까요? 👂";
      };
    }

    function startRecording() {
      recognition.lang = isEnglish ? 'en-US' : 'ko-KR';
      document.getElementById('feedback-msg').innerText = "귀 기울여 듣고 있어요... 말씀 시작! 🎙️";
      recognition.start();
    }

    function checkAccuracy(spokenText) {
      const targetText = isEnglish ? currentVerse.english : currentVerse.korean;
      
      const cleanSpoken = spokenText.replace(/[.,!?]/g, '').split(' ');
      const cleanTarget = targetText.replace(/[.,!?]/g, '').split(' ');
      
      let matchCount = 0;
      cleanTarget.forEach(word => {
        if(cleanSpoken.find(w => w.includes(word) || word.includes(w))) {
          matchCount++;
        }
      });
      
      const accuracy = (matchCount / cleanTarget.length) * 100;
      
      if(accuracy >= 80) {
        sendCompletionToSheet();
      } else {
        document.getElementById('feedback-msg').style.color = "#EF4444";
        document.getElementById('feedback-msg').innerText += `\n(일치율 ${Math.round(accuracy)}%) 아쉽게 커트라인을 못 넘었어요. 조금만 더 또박또박 읽어볼까요?`;
      }
    }

    // 구글 시트에 완료 처리 전송
    async function sendCompletionToSheet() {
      document.getElementById('feedback-msg').innerText = "참 잘했어요! 저장 중... 💾";
      
      // 꽃가루 효과 연출
      confetti({ particleCount: 120, spread: 60, origin: { y: 0.6 } });

      try {
        // 구글 웹앱에 완료 상태 전달 (CORS 우회를 위해 no-cors 모드로 전송할 수 있습니다)
        await fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: currentVerse.id })
        });
        
        // 화면 즉시 갱신
        currentVerse.isCompleted = true;
        const randomCheer = cheers[Math.floor(Math.random() * cheers.length)];
        document.getElementById('feedback-msg').style.color = "var(--success)";
        document.getElementById('feedback-msg').innerText = randomCheer;

        setTimeout(() => {
          closeModal();
          renderList();
          updateStats();
        }, 3500);

      } catch (error) {
        console.error("전송 실패: ", error);
        // 네트워크 에러가 나더라도 클라이언트단에서 완료처리 유도
        currentVerse.isCompleted = true;
        closeModal();
        renderList();
        updateStats();
      }
    }

    function updateStats() {
      const completedCount = versesData.filter(v => v.isCompleted).length;
      const progress = versesData.length ? Math.round((completedCount / versesData.length) * 100) : 0;
      document.getElementById('progress-text').innerText = `${progress}%`;
      
      // 예시용 연속 학습일 (구글 시트 연동 후 동적 계산 가능)
      document.getElementById('streak-text').innerText = completedCount > 0 ? `${completedCount}일째` : '0일째';
    }

    // 웹페이지 시작 시 구글 시트에서 데이터를 받아옵니다.
    window.onload = loadData;
  </script>
</body>
</html>
