<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>기적의 초등영어 파트너</title>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    :root {
      --bg-color: #F8FAFC;
      --card-bg: #FFFFFF;
      --primary: #3B82F6; /* 영어 서비스에 어울리는 스마트 블루 */
      --primary-light: #EFF6FF;
      --text-main: #1E293B;
      --text-muted: #64748B;
      --success: #10B981;
      --border: #E2E8F0;
      --danger: #EF4444;
    }

    body {
      font-family: 'Pretendard', sans-serif;
      background-color: var(--bg-color);
      margin: 0;
      padding: 20px;
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* 클래스업 스타일의 대시보드 (모바일 대응 반응형) */
    .dashboard-header {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .dashboard-title h1 { margin: 0 0 6px 0; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .dashboard-title p { margin: 0; color: var(--text-muted); font-size: 15px; }

    .stats-container { display: flex; gap: 12px; width: 100%; }
    
    @media (min-width: 600px) {
      .stats-container { width: auto; }
      body { padding: 40px 20px; }
      .dashboard-title h1 { font-size: 28px; }
    }

    .stat-box {
      background: var(--primary-light);
      padding: 12px 16px;
      border-radius: 12px;
      text-align: center;
      flex: 1;
      min-width: 90px;
    }

    .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 600; margin-bottom: 4px; }
    .stat-value { font-size: 18px; font-weight: 700; color: var(--primary); }

    /* 리스트 디자인 */
    .sentence-grid { display: flex; flex-direction: column; gap: 12px; }

    .sentence-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .sentence-card:hover { border-color: var(--primary); }

    .sentence-info .day-tag { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 2px; }
    .sentence-info .ref-text { font-size: 17px; font-weight: 600; color: var(--text-main); }

    .list-btn-group { display: flex; gap: 8px; align-items: center; width: 100%; justify-content: flex-end; }
    @media (min-width: 600px) { .list-btn-group { width: auto; } }

    .btn {
      font-family: inherit; font-size: 14px; font-weight: 600;
      padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--card-bg); color: var(--text-main); cursor: pointer;
      transition: all 0.15s ease;
    }
    .btn:hover { background: #F1F5F9; }
    .btn-primary { background: var(--primary); color: white; border: none; }
    .btn-primary:hover { background: #2563EB; }
    .btn-reset { border-color: var(--border); color: var(--text-muted); font-size: 16px; padding: 8px 12px; }
    .btn-reset:hover { border-color: var(--danger); color: var(--danger); background: #FEF2F2; }

    .status-badge {
      display: flex; align-items: center; gap: 4px; color: var(--success);
      font-weight: 600; font-size: 14px; background: #E6F4EA; padding: 9px 16px; border-radius: 8px;
    }

    /* 모달창 반응형 레이아웃 */
    .modal-overlay {
