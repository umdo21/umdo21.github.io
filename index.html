<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>말씀 암송 파트너</title>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    :root {
      --bg-color: #F8FAFC;
      --card-bg: #FFFFFF;
      --primary: #4F46E5;       /* 트렌디한 인디고 블루 */
      --primary-light: #EEF2F6;
      --text-main: #1E293B;
      --text-muted: #64748B;
      --success: #10B981;
      --border: #E2E8F0;
      --danger: #EF4444;
    }

    body {
      font-family: 'Pretendard', sans-serif;
      background-color: var(--bg-color);
      margin: 0;
      padding: 20px; /* 모바일 디폴트 패딩 */
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* 반응형 대시보드 헤더 */
    .dashboard-header {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .dashboard-title h1 { margin: 0 0 6px 0; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .dashboard-title p { margin: 0; color: var(--text-muted); font-size: 15px; }

    .stats-container { display: flex; gap: 12px; width: 100%; }
    
    @media (min-width: 600px) {
      .stats-container { width: auto; }
      body { padding: 40px 20px; }
      .dashboard-title h1 { font-size: 28px; }
    }

    .stat-box {
      background: var(--primary-light);
      padding: 12px 16px;
      border-radius: 12px;
      text-align: center;
      flex: 1;
      min-width: 95px;
    }

    .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 600; margin-bottom: 4px; }
    .stat-value { font-size: 18px; font-weight: 700; color: var(--primary); }

    /* 모바일 반응형 카드 리스트 */
    .verse-grid { display: flex; flex-direction: column; gap: 12px; }

    .verse-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap; /* 모바일 화면에서 버튼 영역이 자동으로 아래로 내려가도록 설정 */
      gap: 12px;
    }

    .verse-card:hover { border-color: var(--primary); }
    .verse-info .day-tag { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 2px; }
    .verse-info .ref-text { font-size: 17px; font-weight: 600; color: var(--text-main); }

    .list-btn-group { display: flex; gap: 8px; align-items: center; width: 100%; justify-content: flex-end; }
    @media (min-width: 600px) { .list-btn-group { width: auto; } }

    .btn {
      font-family: inherit; font-size: 14px; font-weight: 600;
      padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--card-bg); color: var(--text-main); cursor: pointer;
      transition: all 0.15s ease;
    }
    .btn:hover { background: #F1F5F9; }
    .btn-primary { background: var(--primary); color: white; border: none; }
    .btn-primary:hover { background: #4338CA; }
    .btn-reset { border-color: var(--border); color: var(--text-muted); font-size: 16px; padding: 8px 12px; }
    .btn-reset:hover { border-color: var(--danger); color: var(--danger); background: #FEF2F2; }

    .status-badge {
      display: flex; align-items: center; gap: 4px; color: var(--success);
      font-weight: 600; font-size: 14px; background: #E6F4EA; padding: 9px 16px; border-radius: 8px;
    }

    /* 모달창 반응형 레이아웃 */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px);
      display: none; justify-content: center; align-items: center; z-index: 1000;
    }

    .modal-content {
      background: var(--card-bg); width: 85%; max-width: 540px;
      border-radius: 20px; padding: 35px 24px; text-align: center; position: relative;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
    }

    .close-btn { position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; color: var(--text-muted); }
    .modal-header-tag { color: var(--primary); font-weight: 700; font-size: 14px; margin-bottom: 16px; }
    .modal-title { font-size: 22px; font-weight: 700; margin: 0 0 24px 0; }

    .verse-display-box {
      background: var(--bg-color); border-radius: 12px; padding: 25px 18px;
      font-size: 21px; line-height: 1.6; font-weight: 500; margin-bottom: 24px; word-break: keep-all;
    }

    .action-group { display: flex; gap: 10px; justify-content: center; }
    .feedback-area { margin-top: 24px; font-size: 16px; font-weight: 600; color: var(--text-muted); min-height: 50px; line-height: 1.6; }
    .loading-spinner { font-size: 18px; color: var(--text-muted); text-align: center; margin-top: 60px; font-weight: 500; }
  </style>
</head>
<body>

  <div class="container">
    <div class="dashboard-header">
      <div class="dashboard-title">
        <h1>말씀 암송 파트너</h1>
        <p>매일 달콤한 지혜의 말씀을 마음속에 저축해요.</p>
      </div>
      <div class="stats-container">
        <div class="stat-box">
          <div class="stat-label">🔥 연속 학습</div>
          <div class="stat-value" id="streak-text">- 일째</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">📈 전체 진도율</div>
          <div class="stat-value" id="progress-text">-%</div>
        </div>
      </div>
    </div>

    <div id="loading" class="loading-spinner">구글 시트에서 오늘의 말씀을 가져오고 있어요... 🚀</div>
    <div class="verse-grid" id="verse-list-container"></div>
  </div>

  <div class="modal-overlay" id="verse-modal">
    <div class="modal-content">
      <div class="close-btn" onclick="closeModal()">✕</div>
      <div class="modal-header-tag" id="modal-day">DAY 1</div>
      <h2 class="modal-title" id="modal-ref">잠언 1장 1절</h2>
      
      <div class="verse-display-box" id="modal-verse">구절을 불러오는 중입니다.</div>
      
      <div class="action-group">
        <button class="btn" id="lang-toggle-btn" onclick="toggleLanguage()">🇬🇧 영어로 변경</button>
        <button class="btn btn-primary" id="record-btn" onclick="startRecording()">🎤 암송 녹음 시작하기</button>
      </div>
      
      <div class="feedback-area" id="feedback-msg"></div>
    </div>
  </div>

  <script>
    // 기존 말씀 암송 전용 웹앱 URL 지정
    const API_URL = 'https://script.google.com/macros/s/AKfycbx508eKSjf0YgxaQ_rfah_X34uW92vKy4JNwqJQR726mzXdujzrg2RY7JYSmIYyI86irw/exec';
    
    let versesData = [];
    let currentVerse = null;
    let isEnglish = false;
    let recognition;

    const cheers = [
      "최고야! 오늘 말씀도 완벽하게 마음속에 저장 완료! 🌟",
      "와, 발음도 훌륭한걸? 예수님이 정말 기뻐하시겠어! 🎉",
      "대단해! 벌써 이만큼이나 외우다니, 내일도 너무 기대된다! 🥳",
      "마치 천사 같은 목소리였어! 참 잘했어요! ❤️"
    ];

    async function loadData() {
      try {
        const response = await fetch(API_URL);
        versesData = await response.json();
        
        if(versesData.error) {
          document.getElementById('loading').innerText = '구글 시트 에러: ' + versesData.error;
          return;
        }
        
        document.getElementById('loading').style.display = 'none';
        init();
      } catch (error) {
        document.getElementById('loading').innerText = '데이터를 불러오지 못했습니다. 앱스크립트 배포 상태를 확인해주세요.';
        console.error(error); 
      }
    }

    function init() {
      renderList();
      updateStats();
      setupSpeechRecognition();
    }

    function renderList() {
      const container = document.getElementById('verse-list-container');
      container.innerHTML = '';
      
      versesData.forEach(verse => {
        const card = document.createElement('div');
        card.className = 'verse-card';
        card.innerHTML = `
          <div class="verse-info">
            <div class="day-tag">${verse.day}</div>
            <div class="ref-text">${verse.reference}</div>
          </div>
          <div class="list-btn-group">
            <button class="btn" onclick="openModal(${verse.id}, 'view')">📖 말씀보기</button>
            ${verse.isCompleted 
              ? `<div class="status-badge">✓ 완료</div>
                 <button class="btn btn-reset" onclick="updateStatus(${verse.id}, 'reset')" title="기록 초기화">🔄</button>` 
              : `<button class="btn btn-primary" onclick="openModal(${verse.id}, 'record')">🎤 암송하기</button>`}
          </div>
        `;
        container.appendChild(card);
      });
    }

    function openModal(id, mode) {
      currentVerse = versesData.find(v => v.id === id);
      isEnglish = false;
      
      document.getElementById('modal-day').innerText = currentVerse.day.toUpperCase();
      document.getElementById('modal-ref').innerText = currentVerse.reference;
      
      const verseBox = document.getElementById('modal-verse');
      const langBtn = document.getElementById('lang-toggle-btn');
      const recordBtn = document.getElementById('record-btn');
      const feedbackMsg = document.getElementById('feedback-msg');

      feedbackMsg.innerText = "";

      if (mode === 'view') {
        verseBox.style.display = 'flex';
        verseBox.innerText = currentVerse.korean;
        langBtn.style.display = 'inline-block';
        langBtn.innerText = "🇬🇧 영어로 변경";
        recordBtn.style.display = 'none';
      } else if (mode === 'record') {
        verseBox.style.display = 'none';
        langBtn.style.display = 'none';
        recordBtn.style.display = 'inline-block';
        feedbackMsg.innerText = "마음속으로 말씀을 준비한 뒤\n[암송 녹음 시작하기] 버튼을 눌러주세요! 💬";
      }

      document.getElementById('verse-modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('verse-modal').style.display = 'none';
      if(recognition) recognition.stop();
    }

    function toggleLanguage() {
      isEnglish = !isEnglish;
      const btn = document.getElementById('lang-toggle-btn');
      const text = document.getElementById('modal-verse');
      
      if(isEnglish) {
        text.innerText = currentVerse.english;
        btn.innerText = "🇰🇷 한글로 변경";
      } else {
        text.innerText = currentVerse.korean;
        btn.innerText = "🇬🇧 영어로 변경";
      }
    }

    function setupSpeechRecognition() {
      window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!window.SpeechRecognition) return;
      
      recognition = new SpeechRecognition();
      recognition.interimResults = false;

      recognition.onresult = function(event) {
        const spokenText = event.results[0][0].transcript;
        document.getElementById('feedback-msg').style.color = "var(--text-main)";
        document.getElementById('feedback-msg').innerText = "내가 암송한 내용:\n\"" + spokenText + "\"";
        checkAccuracy(spokenText);
      };
      
      recognition.onerror = function() {
        document.getElementById('feedback-msg').innerText = "목소리가 잘 안 들렸어요. 다시 조용히 외워볼까요? 👂";
      };
    }

    function startRecording() {
      recognition.lang = isEnglish ? 'en-US' : 'ko-KR';
      document.getElementById('feedback-msg').innerText = "귀 기울여 들을게요! 말씀해 주세요... ❤️";
      recognition.start();
    }

    function checkAccuracy(spokenText) {
      const targetText = isEnglish ? currentVerse.english : currentVerse.korean;
      const cleanSpoken = spokenText.replace(/[.,!?]/g, '').split(' ');
      const cleanTarget = targetText.replace(/[.,!?]/g, '').split(' ');
      
      let matchCount = 0;
      cleanTarget.forEach(word => {
        if(cleanSpoken.find(w => w.includes(word) || word.includes(w))) {
          matchCount++;
        }
      });
      
      const accuracy = (matchCount / cleanTarget.length) * 100;
      
      if(accuracy >= 80) {
        updateStatus(currentVerse.id, 'complete');
      } else {
        document.getElementById('feedback-msg').style.color = "#EF4444";
        document.getElementById('feedback-msg').innerText += `\n\n(일치율 ${Math.round(accuracy)}%) 아쉽게 커트라인을 못 넘었어요. 조금만 더 또박또박 읽어볼까요?`;
      }
    }

    async function updateStatus(id, action) {
      const target = versesData.find(v => v.id === id);
      
      if (action === 'complete') {
        document.getElementById('feedback-msg').innerText = "참 잘했어요! 완료 기록을 저장 중... 💾";
        confetti({ particleCount: 120, spread: 60, origin: { y: 0.6 } });
        
        target.isCompleted = true;
        target.lastStudyDate = new Date().toISOString();
        
        setTimeout(() => {
          closeModal();
          renderList();
          updateStats();
        }, 3200);
        
      } else if (action === 'reset') {
        if(!confirm(`${target.day} 카드의 완료 체크 표시를 지우고 처음부터 다시 공부할까요?`)) return;
        target.isCompleted = false;
        target.lastStudyDate = null;
        renderList();
        updateStats();
      }
      
      try {
        await fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: id, action: action })
        });
      } catch (error) {
        console.error("구글 시트 동기화 실패:", error);
      }
    }

    function updateStats() {
      const completedList = versesData.filter(v => v.isCompleted);
      
      const progress = versesData.length ? Math.round((completedList.length / versesData.length) * 100) : 0;
      document.getElementById('progress-text').innerText = `${progress}%`;
      
      if (completedList.length === 0) {
        document.getElementById('streak-text').innerText = '0일째';
        return;
      }

      const studyDates = completedList
        .filter(v => v.lastStudyDate)
        .map(v => {
          const d = new Date(v.lastStudyDate);
          return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        });
      
      const uniqueDates = Array.from(new Set(studyDates)).sort().reverse();
      
      if (uniqueDates.length === 0) {
        document.getElementById('streak-text').innerText = '1일째';
        return;
      }

      const today = new Date();
      const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
      const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
      const yesterdayStr = `${yesterday.getFullYear()}-${String(yesterday.getMonth() + 1).padStart(2, '0')}-${String(yesterday.getDate()).padStart(2, '0')}`;

      if (uniqueDates[0] !== todayStr && uniqueDates[0] !== yesterdayStr) {
        document.getElementById('streak-text').innerText = '0일째';
        return;
      }

      let streak = 0;
      let checkDate = uniqueDates[0] === todayStr ? today : yesterday;

      while (true) {
        const checkStr = `${checkDate.getFullYear()}-${String(checkDate.getMonth() + 1).padStart(2, '0')}-${String(checkDate.getDate()).padStart(2, '0')}`;
        if (uniqueDates.includes(checkStr)) {
          streak++;
          checkDate.setDate(checkDate.getDate() - 1);
        } else {
          break;
        }
      }
      document.getElementById('streak-text').innerText = `${streak}일째`;
    }

    window.onload = loadData;
  </script>
</body>
</html>
